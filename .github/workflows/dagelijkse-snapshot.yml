name: Dagelijkse beschikbaarheid snapshot

on:
  schedule:
    - cron: '0 5 * * *'  # elke dag om 06:00 Nederlandse tijd
  workflow_dispatch:  # ook handmatig te starten

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Python instellen
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install pandas requests

      - name: Snapshot draaien
        run: python snapshot.py

      - name: Snapshot committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add snapshots/
          git commit -m "Snapshot ${{ github.run_id }}" || echo "Niets te committen"
          git push
